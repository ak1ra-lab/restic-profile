---
- name: verify restic_profile role applied correctly
  hosts: all
  gather_facts: false
  become: true

  vars:
    _venv_dir: /var/lib/restic-profile/venv
    _python: /var/lib/restic-profile/venv/bin/python
    _bin: /var/lib/restic-profile/venv/bin/restic-profile
    _cli_link: /usr/local/bin/restic-profile
    _scope_helper: /usr/local/bin/restic-profile-scope
    _legacy_selector_script: /etc/restic-profile/restic-profile-select.bash
    _config_file: /etc/restic-profile/restic-profile.toml
    _backup_repository_env_file: /etc/restic-profile/restic-profile-test_backup_repo.env
    _legacy_backup_env_file: /etc/restic-profile/restic-profile-test_backup.env
    _unused_repository_env_file: /etc/restic-profile/restic-profile-unused_repo.env
    _backup_service: /etc/systemd/system/restic-profile-backup-test_backup.service
    _backup_timer: /etc/systemd/system/restic-profile-backup-test_backup.timer
    _retention_service: /etc/systemd/system/restic-profile-retention-test_prune.service
    _retention_timer: /etc/systemd/system/restic-profile-retention-test_prune.timer
    _exclude_file: /etc/restic-profile/restic-profile-test_backup.exclude

  tasks:
    # ------------------------------------------------------------------ #
    # 1. venv Python interpreter                                           #
    # ------------------------------------------------------------------ #

    - name: stat venv Python interpreter
      ansible.builtin.stat:
        path: "{{ _python }}"
      register: restic_profile_verify_venv_python

    - name: assert venv Python exists and is executable
      ansible.builtin.assert:
        that:
          - restic_profile_verify_venv_python.stat.exists
          - restic_profile_verify_venv_python.stat.executable
        fail_msg: >-
          Expected a Python interpreter at {{ _python }} but it was not found.
          Check that pyproject_install created the venv at the correct path.
    # ------------------------------------------------------------------ #
    # 2. restic-profile CLI binary                                         #
    # ------------------------------------------------------------------ #

    - name: stat restic-profile binary
      ansible.builtin.stat:
        path: "{{ _bin }}"
      register: _restic_profile_bin

    - name: assert restic-profile binary exists and is executable
      ansible.builtin.assert:
        that:
          - _restic_profile_bin.stat.exists
          - _restic_profile_bin.stat.executable
        fail_msg: >-
          Expected the restic-profile entry-point at {{ _bin }} but it was not
          found. Confirm that restic-profile was installed and that the entry
          points are wired correctly in pyproject.toml.

    - name: stat restic-profile CLI symlink
      ansible.builtin.stat:
        path: "{{ _cli_link }}"
      register: _restic_profile_cli_link

    - name: assert restic-profile CLI symlink points at the venv entry-point
      ansible.builtin.assert:
        that:
          - _restic_profile_cli_link.stat.exists
          - _restic_profile_cli_link.stat.islnk
          - _restic_profile_cli_link.stat.lnk_source == _bin
        fail_msg: >-
          Expected {{ _cli_link }} to be a symlink to {{ _bin }}, but got {{ _restic_profile_cli_link.stat.lnk_source | default('missing') }}.

    - name: stat legacy interactive profile selector
      ansible.builtin.stat:
        path: "{{ _legacy_selector_script }}"
      register: restic_profile_verify_legacy_selector_script_stat

    - name: assert legacy interactive profile selector is absent
      ansible.builtin.assert:
        that:
          - not restic_profile_verify_legacy_selector_script_stat.stat.exists
        fail_msg: >-
          Expected the legacy interactive profile selector at {{ _legacy_selector_script }} to be absent.

    - name: stat scoped helper
      ansible.builtin.stat:
        path: "{{ _scope_helper }}"
      register: restic_profile_verify_scope_helper_stat

    - name: assert scoped helper exists and is executable
      ansible.builtin.assert:
        that:
          - restic_profile_verify_scope_helper_stat.stat.exists
          - restic_profile_verify_scope_helper_stat.stat.executable
        fail_msg: >-
          Expected the scoped helper at {{ _scope_helper }} but it was not found.
    # ------------------------------------------------------------------ #
    # 3. CLI --help sanity check                                           #
    # ------------------------------------------------------------------ #

    - name: run restic-profile --help
      ansible.builtin.command:
        argv:
          - "{{ _bin }}"
          - --help
      register: restic_profile_verify_help
      changed_when: false
      failed_when: restic_profile_verify_help.rc != 0

    - name: assert --help output mentions the backup subcommand
      ansible.builtin.assert:
        that:
          - >-
            'backup' in (restic_profile_verify_help.stdout | lower) or
            'backup' in (restic_profile_verify_help.stderr | lower)
        fail_msg: >-
          restic-profile --help did not mention the 'backup' subcommand.
          Output: {{ restic_profile_verify_help.stdout }} {{ restic_profile_verify_help.stderr }}

    - name: assert --help output mentions the retention subcommand
      ansible.builtin.assert:
        that:
          - >-
            'retention' in (restic_profile_verify_help.stdout | lower) or
            'retention' in (restic_profile_verify_help.stderr | lower)
        fail_msg: >-
          restic-profile --help did not mention the 'retention' subcommand.
          Output: {{ restic_profile_verify_help.stdout }} {{ restic_profile_verify_help.stderr }}

    - name: assert --help output mentions the validate subcommand
      ansible.builtin.assert:
        that:
          - >-
            'validate' in (restic_profile_verify_help.stdout | lower) or
            'validate' in (restic_profile_verify_help.stderr | lower)
        fail_msg: >-
          restic-profile --help did not mention the 'validate' subcommand.
          Output: {{ restic_profile_verify_help.stdout }} {{ restic_profile_verify_help.stderr }}

    # ------------------------------------------------------------------ #
    # 4. TOML config file                                                  #
    # ------------------------------------------------------------------ #

    - name: stat restic-profile.toml
      ansible.builtin.stat:
        path: "{{ _config_file }}"
      register: restic_profile_verify_config_stat

    - name: assert config file exists
      ansible.builtin.assert:
        that:
          - restic_profile_verify_config_stat.stat.exists
          - restic_profile_verify_config_stat.stat.isreg
        fail_msg: >-
          Expected {{ _config_file }} to exist as a regular file but it was not found.

    - name: assert config file has mode 0640
      ansible.builtin.assert:
        that:
          - restic_profile_verify_config_stat.stat.mode == '0640'
        fail_msg: >-
          Expected {{ _config_file }} to have mode 0640
          (got: {{ restic_profile_verify_config_stat.stat.mode }}).
          The file contains credentials and must not be world-readable.

    - name: source repository env file and print RESTIC_PASSWORD
      ansible.builtin.shell: |
        set -eu
        # shellcheck disable=SC1090
        source "{{ _backup_repository_env_file }}"
        printf '%s' "$RESTIC_PASSWORD"
      args:
        executable: /usr/bin/bash
      register: restic_profile_verify_sourced_backup_password
      changed_when: false

    - name: assert sourced RESTIC_PASSWORD preserves shell-special characters
      ansible.builtin.assert:
        that:
          - restic_profile_verify_sourced_backup_password.stdout == "molecule-$ecret'pw"
        fail_msg: >-
          Expected sourcing {{ _backup_repository_env_file }} to preserve the original
          password, got
          {{ restic_profile_verify_sourced_backup_password.stdout | to_json }}.

    - name: stat legacy per-profile env file
      ansible.builtin.stat:
        path: "{{ _legacy_backup_env_file }}"
      register: restic_profile_verify_legacy_backup_env_stat

    - name: assert legacy per-profile env file is absent
      ansible.builtin.assert:
        that:
          - not restic_profile_verify_legacy_backup_env_stat.stat.exists
        fail_msg: >-
          Expected {{ _legacy_backup_env_file }} to be absent because
          repository env files are now rendered per referenced repository.

    - name: stat unused repository env file
      ansible.builtin.stat:
        path: "{{ _unused_repository_env_file }}"
      register: restic_profile_verify_unused_repository_env_stat

    - name: assert unused repository env file is absent
      ansible.builtin.assert:
        that:
          - not restic_profile_verify_unused_repository_env_stat.stat.exists
        fail_msg: >-
          Expected {{ _unused_repository_env_file }} to be absent because only
          repositories referenced by enabled profiles should get env files.

    - name: read config file content
      ansible.builtin.slurp:
        src: "{{ _config_file }}"
      register: restic_profile_verify_config_content

    - name: assert config contains [global] section
      ansible.builtin.assert:
        that:
          - >-
            '[global]' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected [global] section in {{ _config_file }}"

    - name: assert config contains global retry_lock setting
      ansible.builtin.assert:
        that:
          - >-
            'retry_lock = "5m"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected retry_lock = "5m" in [global] section of {{ _config_file }}.
          Content: {{ restic_profile_verify_config_content.content | ansible.builtin.b64decode }}

    - name: assert config contains global no_cache setting
      ansible.builtin.assert:
        that:
          - >-
            'no_cache = true' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected no_cache = true in [global] section of {{ _config_file }}.
          Content: {{ restic_profile_verify_config_content.content | ansible.builtin.b64decode }}

    - name: assert config contains [profiles.test_backup] section
      ansible.builtin.assert:
        that:
          - >-
            '[profiles.test_backup]' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected [profiles.test_backup] section in {{ _config_file }}"

    - name: assert config contains [repositories.test_backup_repo] section
      ansible.builtin.assert:
        that:
          - >-
            '[repositories.test_backup_repo]' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected [repositories.test_backup_repo] section in {{ _config_file }}"

    - name: assert backup profile repository_ref is rendered
      ansible.builtin.assert:
        that:
          - >-
            'repository_ref = "test_backup_repo"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected repository_ref = \"test_backup_repo\" in {{ _config_file }}"

    - name: assert backup profile repository is rendered correctly
      ansible.builtin.assert:
        that:
          - >-
            'repository = "/tmp/restic-repos/test_backup"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected backup profile repository in {{ _config_file }}"

    - name: assert backup profile sources list is rendered
      ansible.builtin.assert:
        that:
          - >-
            '"/tmp/test-data"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected /tmp/test-data in backup profile sources in {{ _config_file }}"

    - name: assert backup profile tag is rendered
      ansible.builtin.assert:
        that:
          - >-
            'tag = "molecule"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: 'Expected tag = "molecule" in backup profile in {{ _config_file }}'

    - name: assert backup profile one_file_system is rendered
      ansible.builtin.assert:
        that:
          - >-
            'one_file_system = true' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected one_file_system = true in [profiles.test_backup] of {{ _config_file }}.
          Content: {{ restic_profile_verify_config_content.content | ansible.builtin.b64decode }}

    - name: assert backup profile exclude_patterns are rendered
      ansible.builtin.assert:
        that:
          - >-
            '"*.bak"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected *.bak exclude pattern in {{ _config_file }}"

    - name: assert config renders exclude_file path for backup profile
      ansible.builtin.assert:
        that:
          - >-
            'exclude_file = "{{ _exclude_file }}"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected exclude_file = "{{ _exclude_file }}" in [profiles.test_backup] of {{ _config_file }}.
          Content: {{ restic_profile_verify_config_content.content | ansible.builtin.b64decode }}

    - name: assert backup profile no_cache override is rendered
      ansible.builtin.assert:
        that:
          - >-
            'no_cache    = false' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected no_cache    = false in [profiles.test_backup] of {{ _config_file }}.
          Content: {{ restic_profile_verify_config_content.content | ansible.builtin.b64decode }}

    # ------------------------------------------------------------------ #
    # 4b. Per-profile exclude file (from exclude_file_content)             #
    # ------------------------------------------------------------------ #

    - name: stat per-profile exclude file
      ansible.builtin.stat:
        path: "{{ _exclude_file }}"
      register: restic_profile_verify_exclude_file_stat

    - name: assert exclude file exists as a regular file with mode 0640
      ansible.builtin.assert:
        that:
          - restic_profile_verify_exclude_file_stat.stat.exists
          - restic_profile_verify_exclude_file_stat.stat.isreg
          - restic_profile_verify_exclude_file_stat.stat.mode == '0640'
        fail_msg: >-
          Expected {{ _exclude_file }} to exist with mode 0640.
          Ansible renders exclude_file_content to this path.

    - name: read exclude file content
      ansible.builtin.slurp:
        src: "{{ _exclude_file }}"
      register: restic_profile_verify_exclude_file_content

    - name: assert exclude file contains *.log pattern from exclude_file_content
      ansible.builtin.assert:
        that:
          - >-
            '*.log' in (restic_profile_verify_exclude_file_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected '*.log' in {{ _exclude_file }}.
          Content: {{ restic_profile_verify_exclude_file_content.content | ansible.builtin.b64decode }}

    - name: assert exclude file contains node_modules/ pattern from exclude_file_content
      ansible.builtin.assert:
        that:
          - >-
            'node_modules/' in (restic_profile_verify_exclude_file_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected 'node_modules/' in {{ _exclude_file }}.
          Content: {{ restic_profile_verify_exclude_file_content.content | ansible.builtin.b64decode }}

    - name: assert config contains [profiles.test_prune] section
      ansible.builtin.assert:
        that:
          - >-
            '[profiles.test_prune]' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected [profiles.test_prune] section in {{ _config_file }}"

    - name: assert config contains [repositories.test_prune_repo] section
      ansible.builtin.assert:
        that:
          - >-
            '[repositories.test_prune_repo]' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected [repositories.test_prune_repo] section in {{ _config_file }}"

    - name: assert retention-only profile repository_ref is rendered
      ansible.builtin.assert:
        that:
          - >-
            'repository_ref = "test_prune_repo"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected repository_ref = \"test_prune_repo\" in {{ _config_file }}"

    - name: assert prune profile repository is rendered correctly
      ansible.builtin.assert:
        that:
          - >-
            'repository = "/tmp/restic-repos/test_prune"' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected prune profile repository in {{ _config_file }}"

    - name: assert retention-only profile enables prune in config
      ansible.builtin.assert:
        that:
          - >-
            'prune = true' in (restic_profile_verify_config_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected prune = true in [profiles.test_prune] of {{ _config_file }}.
          Content: {{ restic_profile_verify_config_content.content | ansible.builtin.b64decode }}

    # ------------------------------------------------------------------ #
    # 5. Backup profile systemd unit files                                 #
    # ------------------------------------------------------------------ #

    - name: stat backup profile service file
      ansible.builtin.stat:
        path: "{{ _backup_service }}"
      register: restic_profile_verify_backup_svc_stat

    - name: assert backup service file exists
      ansible.builtin.assert:
        that:
          - restic_profile_verify_backup_svc_stat.stat.exists
          - restic_profile_verify_backup_svc_stat.stat.isreg
        fail_msg: >-
          Expected {{ _backup_service }} to exist.
          This file should be generated by the restic_profile role for a backup profile.

    - name: read backup service file content
      ansible.builtin.slurp:
        src: "{{ _backup_service }}"
      register: restic_profile_verify_backup_svc_content

    - name: assert backup service ExecStart calls restic-profile backup
      ansible.builtin.assert:
        that:
          - >-
            'restic-profile backup test_backup' in (restic_profile_verify_backup_svc_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected ExecStart to contain 'restic-profile backup test_backup'
          in {{ _backup_service }}.
          Content: {{ restic_profile_verify_backup_svc_content.content | ansible.builtin.b64decode }}

    - name: assert backup service references the config file
      ansible.builtin.assert:
        that:
          - >-
            '/etc/restic-profile/restic-profile.toml' in (restic_profile_verify_backup_svc_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected --config /etc/restic-profile/restic-profile.toml in {{ _backup_service }}

    - name: assert backup service Type is oneshot
      ansible.builtin.assert:
        that:
          - >-
            'Type=oneshot' in (restic_profile_verify_backup_svc_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected Type=oneshot in {{ _backup_service }}"

    - name: assert backup service CPUQuota is capped to one CPU
      ansible.builtin.assert:
        that:
          - >-
            'CPUQuota=100%' in (restic_profile_verify_backup_svc_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected CPUQuota=100% in {{ _backup_service }}"

    - name: run raw restic with the backup profile env
      ansible.builtin.command:
        argv:
          - /bin/bash
          - -lc
          - >-
            source "{{ _backup_repository_env_file }}" &&
            restic_cmd="${RESTIC_PROFILE_RESTIC_BINARY:-restic}" &&
            "${restic_cmd}" snapshots
      register: restic_profile_verify_restic_direct_run
      changed_when: false
      failed_when: restic_profile_verify_restic_direct_run.rc != 0

    - name: stat backup profile timer file
      ansible.builtin.stat:
        path: "{{ _backup_timer }}"
      register: restic_profile_verify_backup_timer_stat

    - name: assert backup timer file exists
      ansible.builtin.assert:
        that:
          - restic_profile_verify_backup_timer_stat.stat.exists
          - restic_profile_verify_backup_timer_stat.stat.isreg
        fail_msg: "Expected {{ _backup_timer }} to exist."

    - name: read backup timer file content
      ansible.builtin.slurp:
        src: "{{ _backup_timer }}"
      register: restic_profile_verify_backup_timer_content

    - name: assert backup timer OnCalendar is set to daily
      ansible.builtin.assert:
        that:
          - >-
            'OnCalendar=daily' in (restic_profile_verify_backup_timer_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected OnCalendar=daily in {{ _backup_timer }}.
          Content: {{ restic_profile_verify_backup_timer_content.content | ansible.builtin.b64decode }}

    - name: assert backup timer RandomizedDelaySec is set
      ansible.builtin.assert:
        that:
          - >-
            'RandomizedDelaySec=5min' in (restic_profile_verify_backup_timer_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected RandomizedDelaySec=5min in {{ _backup_timer }}"

    - name: assert backup timer has Persistent=true
      ansible.builtin.assert:
        that:
          - >-
            'Persistent=true' in (restic_profile_verify_backup_timer_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected Persistent=true in {{ _backup_timer }}"

    # ------------------------------------------------------------------ #
    # 6. Retention-only profile systemd unit files                         #
    # ------------------------------------------------------------------ #

    - name: stat retention-only profile service file
      ansible.builtin.stat:
        path: "{{ _retention_service }}"
      register: restic_profile_verify_retention_svc_stat

    - name: assert retention-only service file exists
      ansible.builtin.assert:
        that:
          - restic_profile_verify_retention_svc_stat.stat.exists
          - restic_profile_verify_retention_svc_stat.stat.isreg
        fail_msg: >-
          Expected {{ _retention_service }} to exist.
          A retention-only profile should generate a
          restic-profile-retention-*.service file.

    - name: read retention-only service file content
      ansible.builtin.slurp:
        src: "{{ _retention_service }}"
      register: restic_profile_verify_retention_svc_content

    - name: assert retention-only service ExecStart calls restic-profile retention
      ansible.builtin.assert:
        that:
          - >-
            'restic-profile retention test_prune' in (restic_profile_verify_retention_svc_content.content | ansible.builtin.b64decode)
          - >-
            '--prune' not in (restic_profile_verify_retention_svc_content.content | ansible.builtin.b64decode)
        fail_msg: >-
          Expected ExecStart to contain
          'restic-profile retention test_prune' without CLI prune flags in
          {{ _retention_service }}.
          Content: {{ restic_profile_verify_retention_svc_content.content | ansible.builtin.b64decode }}

    - name: assert retention-only service Type is oneshot
      ansible.builtin.assert:
        that:
          - >-
            'Type=oneshot' in (restic_profile_verify_retention_svc_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected Type=oneshot in {{ _retention_service }}"

    - name: assert retention-only service CPUQuota is capped to one CPU
      ansible.builtin.assert:
        that:
          - >-
            'CPUQuota=100%' in (restic_profile_verify_retention_svc_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected CPUQuota=100% in {{ _retention_service }}"

    - name: stat retention-only profile timer file
      ansible.builtin.stat:
        path: "{{ _retention_timer }}"
      register: restic_profile_verify_retention_timer_stat

    - name: assert retention-only timer file exists
      ansible.builtin.assert:
        that:
          - restic_profile_verify_retention_timer_stat.stat.exists
          - restic_profile_verify_retention_timer_stat.stat.isreg
        fail_msg: "Expected {{ _retention_timer }} to exist."

    - name: read retention-only timer file content
      ansible.builtin.slurp:
        src: "{{ _retention_timer }}"
      register: restic_profile_verify_retention_timer_content

    - name: assert retention-only timer OnCalendar is set to daily
      ansible.builtin.assert:
        that:
          - >-
            'OnCalendar=daily' in (restic_profile_verify_retention_timer_content.content | ansible.builtin.b64decode)
        fail_msg: "Expected OnCalendar=daily in {{ _retention_timer }}"

    # ------------------------------------------------------------------ #
    # 7. Naming convention — no cross-contamination                        #
    # ------------------------------------------------------------------ #

    - name: assert backup profile did NOT generate a restic-profile-retention-test_backup file
      ansible.builtin.stat:
        path: /etc/systemd/system/restic-profile-retention-test_backup.service
      register: restic_profile_verify_wrong_retention_svc

    - name: assert restic-profile-retention-test_backup.service does not exist
      ansible.builtin.assert:
        that:
          - not restic_profile_verify_wrong_retention_svc.stat.exists
        fail_msg: >-
          restic-profile-retention-test_backup.service should NOT exist.
          test_backup is a backup profile and must use the
          restic-profile-backup-* naming convention.

    - name: assert retention-only profile did NOT generate a restic-profile-backup-test_prune file
      ansible.builtin.stat:
        path: /etc/systemd/system/restic-profile-backup-test_prune.service
      register: restic_profile_verify_wrong_backup_svc

    - name: assert restic-profile-backup-test_prune.service does not exist
      ansible.builtin.assert:
        that:
          - not restic_profile_verify_wrong_backup_svc.stat.exists
        fail_msg: >-
          restic-profile-backup-test_prune.service should NOT exist.
          test_prune is a retention-only profile and must use the
          restic-profile-retention-* naming convention.

    # ------------------------------------------------------------------ #
    # 8. restic-profile validate CLI sanity check                          #
    # ------------------------------------------------------------------ #

    - name: run restic-profile validate against deployed config
      ansible.builtin.command:
        argv:
          - "{{ _bin }}"
          - validate
          - --config
          - "{{ _config_file }}"
      register: restic_profile_verify_validate
      changed_when: false
      failed_when: restic_profile_verify_validate.rc != 0

    - name: assert validate reports config is valid
      ansible.builtin.assert:
        that:
          - >-
            'valid' in (restic_profile_verify_validate.stdout | lower) or
            restic_profile_verify_validate.rc == 0
        fail_msg: >-
          restic-profile validate exited non-zero or did not report a valid
          config.
          stdout: {{ restic_profile_verify_validate.stdout }}
          stderr: {{ restic_profile_verify_validate.stderr }}
