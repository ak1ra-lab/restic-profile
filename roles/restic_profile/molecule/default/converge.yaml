---
- name: converge
  hosts: all
  gather_facts: false
  become: true

  vars:
    restic_profile_pip_install_source: local

    restic_profile_no_cache: true
    restic_profile_retry_lock: "5m"

    restic_profile_repositories:
      test_backup_repo:
        repository: "/tmp/restic-repos/test_backup"
        password: "molecule-$ecret'pw"
      test_prune_repo:
        repository: "/tmp/restic-repos/test_prune"
        password: "molecule-prune-password"
      unused_repo:
        repository: "/tmp/restic-repos/unused"
        password: "molecule-unused-password"

    restic_profile_profiles:
      # Backup+retention profile — one service/timer pair per profile.
      test_backup:
        repository_ref: test_backup_repo
        tag: "molecule"
        on_calendar: "daily"
        randomized_delay_sec: "5min"
        backup:
          sources:
            - /tmp/test-data
          exclude_patterns:
            - "*.bak"
          exclude_file_content: |
            # Large exclude list rendered by Ansible to a separate file
            *.log
            *.tmp
            .cache/
            .local/share/Trash/
            node_modules/
          one_file_system: true
        retention:
          keep_hourly: 6
          keep_daily: 7
          keep_weekly: 4
          keep_monthly: 3
        system_user: root
        no_cache: false
        enabled: true
        # Do not start the timer during molecule runs; the stub restic binary
        # is present but we only verify file artefacts, not live execution.
        timer_enabled: false

      # Retention-only profile — still one service/timer pair per profile.
      test_prune:
        repository_ref: test_prune_repo
        on_calendar: "daily"
        randomized_delay_sec: "5min"
        retention:
          prune: true
          keep_daily: 7
          keep_weekly: 4
          keep_monthly: 3
        system_user: root
        enabled: true
        timer_enabled: false

  roles:
    - role: restic_profile
