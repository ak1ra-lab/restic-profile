---
- name: converge
  hosts: all
  gather_facts: false
  become: true

  vars:
    restic_profile_pip_install_source: local

    restic_profile_no_cache: true
    restic_profile_retry_lock: "5m"

    restic_profile_profiles:
      # Backup profile — sources non-empty → restic-profile-backup-test_backup.{service,timer}
      test_backup:
        repository: "/tmp/restic-repos/test_backup"
        password: "molecule-$ecret'pw"
        sources:
          - /tmp/test-data
        tag: "molecule"
        exclude_patterns:
          - "*.bak"
        exclude_file_content: |
          # Large exclude list rendered by Ansible to a separate file
          *.log
          *.tmp
          .cache/
          .local/share/Trash/
          node_modules/
        one_file_system: true
        forget: true
        keep_hourly: 6
        keep_daily: 7
        keep_weekly: 4
        keep_monthly: 3
        on_calendar: "daily"
        randomized_delay_sec: "5min"
        system_user: root
        no_cache: false
        enabled: true
        # Do not start the timer during molecule runs; the stub restic binary
        # is present but we only verify file artefacts, not live execution.
        timer_enabled: false

      # Retention-only profile — sources: [] → restic-profile-forget-test_prune.{service,timer}
      test_prune:
        repository: "/tmp/restic-repos/test_prune"
        password: "molecule-prune-password"
        sources: []
        prune: true
        keep_daily: 7
        keep_weekly: 4
        keep_monthly: 3
        on_calendar: "daily"
        randomized_delay_sec: "5min"
        system_user: root
        enabled: true
        timer_enabled: false

  roles:
    - role: restic_profile
