---
# Deploy a systemd service + optional timer pair for each enabled profile.
#
# Naming convention (defined in vars/main.yaml):
#   Profile units: restic-profile-<name>.{service,timer}

- name: compute deployment plan
  ansible.builtin.set_fact:
    _restic_profile_plan: >-
      {{
        restic_profile_profiles
        | ak1ra_lab.restic_profile.deployment_plan(
            restic_profile_repositories,
            restic_profile_config_dir,
            restic_profile_unit_prefix
          )
      }}
  no_log: true

- name: find managed systemd unit files on disk
  become: true
  ansible.builtin.find:
    paths: /etc/systemd/system
    patterns:
      - "{{ restic_profile_unit_prefix }}*.service"
      - "{{ restic_profile_unit_prefix }}*.timer"
  register: _restic_profile_existing_units

- name: stop and disable orphaned systemd timers
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item | ansible.builtin.basename }}"
    state: stopped
    enabled: false
  loop: >-
    {{
      _restic_profile_existing_units.files
      | map(attribute='path')
      | select('ansible.builtin.search', '\\.timer$')
      | list
    }}
  when: >-
    (item | ansible.builtin.basename | ansible.builtin.regex_replace('\\.timer$', ''))
    not in (_restic_profile_plan.expected_unit_names)
  failed_when: false

- name: remove orphaned systemd unit files
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _restic_profile_existing_units.files }}"
  when: >-
    (item.path | ansible.builtin.basename | ansible.builtin.regex_replace('\\.(service|timer)$', ''))
    not in (_restic_profile_plan.expected_unit_names)
  notify: systemctl daemon-reload

- name: deploy systemd service unit for each enabled profile
  become: true
  ansible.builtin.template:
    src: etc/systemd/system/restic-profile.service.j2
    dest: "/etc/systemd/system/{{ item.unit_name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ _restic_profile_plan.service_units }}"
  loop_control:
    label: "{{ item.unit_name }}.service"
  notify: systemctl daemon-reload
  no_log: true

- name: check current timer unit state for each profile
  become: true
  ak1ra_lab.restic_profile.systemd_timer_state:
    units: >-
      {{
        _restic_profile_plan.service_units
        | map(attribute='unit_name')
        | map('ansible.builtin.regex_replace', '$', '.timer')
        | list
      }}
  register: _restic_profile_timer_state
  no_log: true

- name: stop and disable timers for profiles without on_calendar
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item.unit_name }}.timer"
    state: stopped
    enabled: false
  loop: "{{ _restic_profile_plan.service_units }}"
  when: >-
    not item.has_timer
    and (
      (_restic_profile_timer_state.state[item.unit_name ~ '.timer'].active_state | default('')) == 'active'
      or (_restic_profile_timer_state.state[item.unit_name ~ '.timer'].unit_file_state | default('')) == 'enabled')
  no_log: true

- name: remove timer files for profiles without on_calendar
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item.unit_name }}.timer"
    state: absent
  loop: "{{ _restic_profile_plan.service_units }}"
  when: not item.has_timer
  notify: systemctl daemon-reload
  no_log: true

- name: deploy systemd timer unit for profiles with on_calendar configured
  become: true
  ansible.builtin.template:
    src: etc/systemd/system/restic-profile.timer.j2
    dest: "/etc/systemd/system/{{ item.unit_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ _restic_profile_plan.service_units }}"
  loop_control:
    label: "{{ item.unit_name }}.timer"
  when: item.has_timer
  notify: systemctl daemon-reload
  no_log: true

- name: start and enable systemd timers with on_calendar configured
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item.unit_name }}.timer"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ _restic_profile_plan.service_units }}"
  when: item.has_timer
  no_log: true
