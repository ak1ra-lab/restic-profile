---
# Deploy a systemd service + timer pair for each enabled profile section.
#
# Naming convention (defined in vars/main.yaml):
#   Backup units: restic-profile-backup-<name>.{service,timer}
#   Retention/Forget units: restic-profile-retention-<name>.{service,timer}

- name: Construct flat list of service units to deploy
  vars:
    restic_profile_service_units_json: >-
      {% set units = [] %}
      {% for pname, p in restic_profile_profiles.items() %}
      {%   if p.enabled | default(true) | ansible.builtin.bool %}
      {%     if p.backup is defined %}
      {%       set _ = units.append({
                 'profile_name': pname,
                 'profile': p,
                 'type': 'backup',
                 'unit_name': restic_profile_backup_unit_prefix ~ pname,
                 'sub_config': p.backup,
                 'timer_enabled': p.timer_enabled | default(true) | ansible.builtin.bool
               }) %}
      {%     endif %}
      {%     if p.retention is defined %}
      {%       set _ = units.append({
                 'profile_name': pname,
                 'profile': p,
                 'type': 'retention',
                 'unit_name': restic_profile_retention_unit_prefix ~ pname,
                 'sub_config': p.retention,
                 'timer_enabled': p.timer_enabled | default(true) | ansible.builtin.bool
               }) %}
      {%     endif %}
      {%   endif %}
      {% endfor %}
      {{ units | to_json }}
  ansible.builtin.set_fact:
    restic_profile_service_units: "{{ restic_profile_service_units_json | from_json }}"

- name: deploy systemd service unit for each enabled profile section
  become: true
  ansible.builtin.template:
    src: etc/systemd/system/restic-profile.service.j2
    dest: "/etc/systemd/system/{{ item.unit_name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_profile_service_units | default([]) }}"
  notify: systemctl daemon-reload
  no_log: true

- name: check current timer unit state for each profile section # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "systemctl show --property=ActiveState --property=UnitFileState {{ item.unit_name }}.timer"
  register: _restic_profile_timer_check
  changed_when: false
  failed_when: false
  loop: "{{ restic_profile_service_units | default([]) }}"
  no_log: true

- name: stop and disable unused or disabled systemd timers
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item.unit_name }}.timer"
    state: stopped
    enabled: false
  loop: "{{ restic_profile_service_units | default([]) }}"
  loop_control:
    index_var: _profile_index
  when:
    - not (item.timer_enabled and (item.sub_config.on_calendar | default('') | string | trim | length > 0))
    - >-
      'ActiveState=active' in (
        _restic_profile_timer_check.results[_profile_index].stdout_lines | default([]))
      or 'UnitFileState=enabled' in (
        _restic_profile_timer_check.results[_profile_index].stdout_lines | default([]))
  no_log: true

- name: remove systemd timer files for profile sections without on_calendar configured
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item.unit_name }}.timer"
    state: absent
  loop: "{{ restic_profile_service_units | default([]) }}"
  when:
    - not (item.sub_config.on_calendar | default('') | string | trim | length > 0)
  notify: systemctl daemon-reload
  no_log: true

- name: deploy systemd timer unit for each enabled profile section with on_calendar configured
  become: true
  ansible.builtin.template:
    src: etc/systemd/system/restic-profile.timer.j2
    dest: "/etc/systemd/system/{{ item.unit_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_profile_service_units | default([]) }}"
  when:
    - item.timer_enabled
    - item.sub_config.on_calendar | default('') | string | trim | length > 0
  notify: systemctl daemon-reload
  no_log: true

- name: start and enable systemd timers with on_calendar configured
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item.unit_name }}.timer"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ restic_profile_service_units | default([]) }}"
  when:
    - item.timer_enabled
    - item.sub_config.on_calendar | default('') | string | trim | length > 0
  no_log: true
