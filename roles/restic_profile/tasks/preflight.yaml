---
- name: assert restic install source is supported
  ansible.builtin.assert:
    that:
      - restic_profile_restic_install_source in ['apt', 'go_build', 'existing']
    fail_msg: >-
      restic_profile_restic_install_source must be one of
      ['apt', 'go_build', 'existing'] (got:
      {{ restic_profile_restic_install_source | to_json }})

- name: assert restic_profile mappings are dicts
  block:
    - name: assert restic_profile_repositories is a dict
      ansible.builtin.assert:
        that:
          - restic_profile_repositories is mapping
        fail_msg: >-
          restic_profile_repositories must be a dict (mapping), got:
          {{ restic_profile_repositories | ansible.builtin.type_debug }}

    - name: assert restic_profile_profiles is a dict
      ansible.builtin.assert:
        that:
          - restic_profile_profiles is mapping
        fail_msg: >-
          restic_profile_profiles must be a dict (mapping), got:
          {{ restic_profile_profiles | ansible.builtin.type_debug }}

- name: assert each repository definition is valid
  ansible.builtin.assert:
    that:
      - _repository_item.key | string | length > 0
      - _repository_item.value is mapping
      - _repository_item.value.repository | default('') | string | length > 0
      - _repository_item.value.password | default('') | string | length > 0
    fail_msg: >-
      Repository {{ _repository_item.key | default('<empty>') }} must be a dict
      (mapping) with non-empty 'repository' and 'password' fields.
  loop: "{{ restic_profile_repositories | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _repository_item
    label: "{{ _repository_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled profile definition is valid
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
  ansible.builtin.assert:
    that:
      - _profile_item.key | string | length > 0
      - _profile_item.value is mapping
      - _profile_item.value.repository_ref | default('') | string | length > 0
      - _profile_item.value.repository_ref | default('') in restic_profile_repositories
      - _profile_item.value.backup is defined or _profile_item.value.retention is defined
      - _profile_item.value.systemd_scope | default('system') in ['system', 'user']
    fail_msg: >-
      Profile {{ _profile_item.key | default('<empty>') }}: enabled profiles must
      be dicts (mapping) with a non-empty 'repository_ref' that points to
      restic_profile_repositories, at least one of 'backup' or 'retention',
      and a valid systemd_scope ('system' or 'user').
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled backup profile is valid
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.backup is defined
  ansible.builtin.assert:
    that:
      - _profile_item.value.backup is mapping
      - (_profile_item.value.backup.sources | default([])) | length > 0
    fail_msg: >-
      Profile {{ _profile_item.key }}: backup section must be a dict (mapping)
      with at least one source.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled retention profile is valid
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.retention is defined
  ansible.builtin.assert:
    that:
      - _profile_item.value.retention is mapping
      - >-
        (_profile_item.value.retention.keep_last    | default(0) | int > 0) or
        (_profile_item.value.retention.keep_hourly  | default(0) | int > 0) or
        (_profile_item.value.retention.keep_daily   | default(0) | int > 0) or
        (_profile_item.value.retention.keep_weekly  | default(0) | int > 0) or
        (_profile_item.value.retention.keep_monthly | default(0) | int > 0) or
        (_profile_item.value.retention.keep_yearly  | default(0) | int > 0) or
        (_profile_item.value.retention.prune | default(false) | ansible.builtin.bool)
    fail_msg: >-
      Profile {{ _profile_item.key }}: retention section must be a dict
      (mapping) with at least one actionable retention setting. Configure
      one or more keep_* fields and/or set prune=true.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert restic_profile_notify_configs is a dict
  when: restic_profile_notify_configs | length > 0
  ansible.builtin.assert:
    that:
      - restic_profile_notify_configs is mapping
    fail_msg: >-
      restic_profile_notify_configs must be a dict (mapping), got:
      {{ restic_profile_notify_configs | ansible.builtin.type_debug }}

- name: assert each notify config has a valid type
  when: restic_profile_notify_configs | length > 0
  ansible.builtin.assert:
    that:
      - _ncfg_item.value is mapping
      - _ncfg_item.value.type | default('') in ['telegram', 'dingtalk', 'wechat']
    fail_msg: >-
      Notify config {{ _ncfg_item.key }}: must be a dict (mapping) with a
      valid 'type' field (telegram, dingtalk, or wechat).
  loop: "{{ restic_profile_notify_configs | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _ncfg_item
    label: "{{ _ncfg_item.key | default('<empty>') }}"
  no_log: true

- name: assert notify_ref on profiles references an existing notify config
  when:
    - _pitem_nf.value.enabled | default(true) | ansible.builtin.bool
    - _pitem_nf.value.notify_ref is defined
    - _pitem_nf.value.notify_ref | default('') != ''
  ansible.builtin.assert:
    that:
      - _pitem_nf.value.notify_ref in restic_profile_notify_configs
    fail_msg: >-
      Profile {{ _pitem_nf.key }}: notify_ref '{{ _pitem_nf.value.notify_ref }}'
      not found in restic_profile_notify_configs.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _pitem_nf
    label: "{{ _pitem_nf.key | default('<empty>') }}"
  no_log: true

- name: get passwd entries for user-scope target users
  ansible.builtin.getent:
    database: passwd
    key: "{{ _user_scope_user }}"
  loop: >-
    {{
      restic_profile_profiles
      | ak1ra_lab.restic_profile.user_scope_users(restic_profile_user)
    }}
  loop_control:
    loop_var: _user_scope_user

- name: compute deployment targets
  ansible.builtin.set_fact:
    _restic_profile_targets: >-
      {{
        restic_profile_profiles
        | ak1ra_lab.restic_profile.deployment_targets(
            restic_profile_user,
            ansible_facts.getent_passwd | default({}),
            restic_profile_state_dir
          )
      }}

- name: stat previous deployment registry
  ansible.builtin.stat:
    path: "{{ restic_profile_registry_file }}"
  register: _restic_profile_registry_stat

- name: read previous deployment registry
  when: _restic_profile_registry_stat.stat.exists
  ansible.builtin.slurp:
    src: "{{ restic_profile_registry_file }}"
  register: _restic_profile_registry_slurp

- name: parse previously deployed targets
  ansible.builtin.set_fact:
    _restic_profile_registered_targets: >-
      {{
        (_restic_profile_registry_slurp.content | ansible.builtin.b64decode | ansible.builtin.from_json)
        if (_restic_profile_registry_stat.stat.exists | default(false))
        else []
      }}

- name: detect leftover system-scope units without a registry entry
  when: >-
    'system:root' not in (_restic_profile_targets | map(attribute='key') | list)
  ansible.builtin.find:
    paths: /etc/systemd/system
    patterns:
      - "restic-profile-*.service"
      - "restic-profile-*.timer"
  register: _restic_profile_system_leftover

- name: compute orphaned deployment targets
  ansible.builtin.set_fact:
    _restic_profile_orphan_targets: >-
      {{
        _restic_profile_targets
        | ak1ra_lab.restic_profile.orphan_targets(
            _restic_profile_registered_targets,
            _restic_profile_system_leftover.matched | default(0),
            restic_profile_state_dir
          )
      }}

- name: compute full removal target set
  ansible.builtin.set_fact:
    _restic_profile_removal_targets: "{{ _restic_profile_targets + _restic_profile_orphan_targets }}"
