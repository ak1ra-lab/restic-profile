---
- name: assert restic_profile_profiles is a dict
  ansible.builtin.assert:
    that:
      - restic_profile_profiles is mapping
    fail_msg: >-
      restic_profile_profiles must be a dict (mapping), got:
      {{ restic_profile_profiles | ansible.builtin.type_debug }}

- name: assert each enabled profile has required fields
  ansible.builtin.assert:
    that:
      - _profile_item.key | string | length > 0
      - _profile_item.value.repository is defined
      - _profile_item.value.repository | string | length > 0
      - _profile_item.value.password is defined
      - _profile_item.value.password | string | length > 0
    fail_msg: >-
      Profile {{ _profile_item.key }}: 'repository' and 'password' are required fields.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key }}"
  when: _profile_item.value.enabled | default(true) | ansible.builtin.bool
  no_log: true

- name: assert each enabled retention-only profile has at least one keep_* policy
  ansible.builtin.assert:
    that:
      - >-
        (_profile_item.value.keep_last    | default(0) | int > 0) or
        (_profile_item.value.keep_hourly  | default(6) | int > 0) or
        (_profile_item.value.keep_daily   | default(7) | int > 0) or
        (_profile_item.value.keep_weekly  | default(4) | int > 0) or
        (_profile_item.value.keep_monthly | default(3) | int > 0) or
        (_profile_item.value.keep_yearly  | default(0) | int > 0)
    fail_msg: >-
      Profile {{ _profile_item.key }}: retention-only profile (sources: []) must have at least one
      keep_* retention policy configured (all are 0).
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key }}"
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - (_profile_item.value.sources | default([])) | length == 0
  no_log: true
