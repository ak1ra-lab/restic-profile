---
- name: assert restic install source is supported
  ansible.builtin.assert:
    that:
      - restic_profile_restic_install_source in ['apt', 'go_build', 'existing']
    fail_msg: >-
      restic_profile_restic_install_source must be one of
      ['apt', 'go_build', 'existing'] (got:
      {{ restic_profile_restic_install_source | to_json }})

- name: assert restic_profile_profiles is a dict
  ansible.builtin.assert:
    that:
      - restic_profile_profiles is mapping
    fail_msg: >-
      restic_profile_profiles must be a dict (mapping), got:
      {{ restic_profile_profiles | ansible.builtin.type_debug }}

- name: assert restic_profile_repositories is a dict
  ansible.builtin.assert:
    that:
      - restic_profile_repositories is mapping
    fail_msg: >-
      restic_profile_repositories must be a dict (mapping), got:
      {{ restic_profile_repositories | ansible.builtin.type_debug }}

- name: assert each repository definition is a dict
  ansible.builtin.assert:
    that:
      - _repository_item.key | string | length > 0
      - _repository_item.value is mapping
    fail_msg: >-
      Repository {{ _repository_item.key | default('<empty>') }} must be a dict (mapping).
  loop: "{{ restic_profile_repositories | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _repository_item
    label: "{{ _repository_item.key | default('<empty>') }}"
  no_log: true

- name: assert each repository has required fields
  when:
    - _repository_item.value is mapping
  ansible.builtin.assert:
    that:
      - _repository_item.value.repository is defined
      - _repository_item.value.repository | string | length > 0
      - _repository_item.value.password is defined
      - _repository_item.value.password | string | length > 0
    fail_msg: >-
      Repository {{ _repository_item.key }}: 'repository' and 'password' are required fields.
  loop: "{{ restic_profile_repositories | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _repository_item
    label: "{{ _repository_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled profile definition is a dict
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
  ansible.builtin.assert:
    that:
      - _profile_item.key | string | length > 0
      - _profile_item.value is mapping
    fail_msg: >-
      Profile {{ _profile_item.key | default('<empty>') }} must be a dict (mapping).
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled profile has required top-level fields
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
  ansible.builtin.assert:
    that:
      - _profile_item.value.repository_ref is defined
      - _profile_item.value.repository_ref | string | length > 0
      - _profile_item.value.repository_ref in restic_profile_repositories
      - _profile_item.value.backup is defined or _profile_item.value.retention is defined
    fail_msg: >-
      Profile {{ _profile_item.key }}: enabled profiles must define a non-empty 'repository_ref'
      that points to restic_profile_repositories and configure at least one of 'backup' or
      'retention'.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled backup profile has non-empty sources
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.backup is defined
  ansible.builtin.assert:
    that:
      - _profile_item.value.backup is mapping
    fail_msg: >-
      Profile {{ _profile_item.key }}: backup section must be a dict (mapping).
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled backup profile source list is non-empty
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.backup is mapping
  ansible.builtin.assert:
    that:
      - (_profile_item.value.backup.sources | default([])) | length > 0
    fail_msg: >-
      Profile {{ _profile_item.key }}: backup section must have at least one source.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled backup profile avoids removed nested schedule fields
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.backup is mapping
  ansible.builtin.assert:
    that:
      - _profile_item.value.backup.post_backup_retention is not defined
      - _profile_item.value.backup.on_calendar is not defined
      - _profile_item.value.backup.randomized_delay_sec is not defined
    fail_msg: >-
      Profile {{ _profile_item.key }}: move backup.on_calendar and backup.randomized_delay_sec
      to the profile root and remove backup.post_backup_retention. Mixed profiles now run
      retention automatically after backup.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled retention profile is a dict
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.retention is defined
  ansible.builtin.assert:
    that:
      - _profile_item.value.retention is mapping
    fail_msg: >-
      Profile {{ _profile_item.key }}: retention section must be a dict (mapping).
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled retention profile has at least one keep_* policy
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.retention is mapping
  ansible.builtin.assert:
    that:
      - >-
        (_profile_item.value.retention.keep_last    | default(0) | int > 0) or
        (_profile_item.value.retention.keep_hourly  | default(0) | int > 0) or
        (_profile_item.value.retention.keep_daily   | default(0) | int > 0) or
        (_profile_item.value.retention.keep_weekly  | default(0) | int > 0) or
        (_profile_item.value.retention.keep_monthly | default(0) | int > 0) or
        (_profile_item.value.retention.keep_yearly  | default(0) | int > 0)
    fail_msg: >-
      Profile {{ _profile_item.key }}: retention section must be a dict with at least one
      keep_* retention policy configured (all are 0).
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true

- name: assert each enabled retention profile avoids removed nested schedule fields
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value is mapping
    - _profile_item.value.retention is mapping
  ansible.builtin.assert:
    that:
      - _profile_item.value.retention.on_calendar is not defined
      - _profile_item.value.retention.randomized_delay_sec is not defined
    fail_msg: >-
      Profile {{ _profile_item.key }}: move retention.on_calendar and
      retention.randomized_delay_sec to the profile root.
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key | default('<empty>') }}"
  no_log: true
