---
- name: find all restic-profile managed systemd unit files
  become: true
  ansible.builtin.find:
    paths: /etc/systemd/system
    patterns:
      - "restic-profile-*.service"
      - "restic-profile-*.timer"
  register: _restic_profile_found_units

- name: stop and disable all managed timers
  become: true
  ansible.builtin.systemd_service:
    name: "{{ _found_unit | ansible.builtin.basename }}"
    state: stopped
    enabled: false
    daemon_reload: false
  loop: >-
    {{
      _restic_profile_found_units.files
      | map(attribute='path')
      | select('ansible.builtin.search', '\\.timer$')
      | list
    }}
  loop_control:
    loop_var: _found_unit
  failed_when: false

- name: remove all managed systemd unit files
  become: true
  ansible.builtin.file:
    path: "{{ _found_unit.path }}"
    state: absent
  loop: "{{ _restic_profile_found_units.files }}"
  loop_control:
    loop_var: _found_unit
  notify: systemctl daemon-reload

- name: find all restic-profile managed exclude files
  become: true
  ansible.builtin.find:
    paths: "{{ restic_profile_config_dir }}"
    patterns: "restic-profile-*.exclude"
  register: _restic_profile_found_excludes

- name: remove all managed exclude files
  become: true
  ansible.builtin.file:
    path: "{{ _found_exclude.path }}"
    state: absent
  loop: "{{ _restic_profile_found_excludes.files }}"
  loop_control:
    loop_var: _found_exclude

- name: find all restic-profile managed .env files
  become: true
  ansible.builtin.find:
    paths: "{{ restic_profile_config_dir }}"
    patterns: "restic-profile-*.env"
  register: _restic_profile_found_env

- name: remove all managed .env files
  become: true
  ansible.builtin.file:
    path: "{{ _found_env.path }}"
    state: absent
  loop: "{{ _restic_profile_found_env.files }}"
  loop_control:
    loop_var: _found_env

- name: remove restic-profile TOML config
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_config_file }}"
    state: absent

- name: remove restic-profile CLI symlink
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_cli_link }}"
    state: absent

- name: remove restic-profile scoped helper
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_scope_helper_path }}"
    state: absent

- name: remove managed hook directory
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_hooks_dir }}"
    state: absent

- name: remove restic-profile virtual environment
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_venv_dir }}"
    state: absent
