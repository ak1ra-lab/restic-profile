---
- name: remove per-target artifacts
  ansible.builtin.include_tasks: _remove_target.yaml
  loop: "{{ _restic_profile_removal_targets | default(_restic_profile_targets | default([])) }}"
  loop_control:
    loop_var: _target
    label: "{{ _target.key }}"

- name: remove deployment registry
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_registry_file }}"
    state: absent

- name: remove restic-profile CLI symlink
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_cli_link }}"
    state: absent

- name: remove restic-profile scoped helper
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_scope_helper_path }}"
    state: absent

- name: remove restic-profile virtual environment
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_venv_dir }}"
    state: absent
