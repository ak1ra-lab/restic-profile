---
- name: ensure restic-profile config directory exists
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: ensure restic-profile hooks directory exists
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_hooks_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: deploy managed hook files for enabled profiles
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
  ansible.builtin.include_tasks: hooks.yaml
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key }}"
  vars:
    restic_profile_hook_profile_name: "{{ _profile_item.key }}"
    restic_profile_hook_profile: "{{ _profile_item.value }}"

- name: deploy per-profile exclude file from exclude_file_content
  become: true
  ansible.builtin.copy:
    content: "{{ _profile_item.value.backup.exclude_file_content }}"
    dest: "{{ restic_profile_config_dir }}/restic-profile-{{ _profile_item.key }}.exclude"
    owner: root
    group: root
    # 0640: same restriction as the main TOML config — contains path patterns
    # that reveal the host's filesystem layout, treat as mildly sensitive.
    mode: "0640"
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key }}"
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
    - _profile_item.value.backup is defined
    - _profile_item.value.backup.exclude_file_content | default('') | length > 0
  no_log: true

- name: construct expected .exclude file paths
  vars:
    restic_profile_exclude_file_paths_json: >-
      {% set paths = [] %}
      {% for pname, pval in restic_profile_profiles.items() %}
      {%   if pval.enabled | default(true) | ansible.builtin.bool
             and pval.backup is defined
             and pval.backup.exclude_file_content | default('') | length > 0 %}
      {%     set _ = paths.append(restic_profile_config_dir ~ '/restic-profile-' ~ pname ~ '.exclude') %}
      {%   endif %}
      {% endfor %}
      {{ paths | to_json }}
  ansible.builtin.set_fact:
    restic_profile_exclude_file_paths: "{{ restic_profile_exclude_file_paths_json | from_json }}"
  no_log: true

- name: find managed .exclude files in config directory
  become: true
  ansible.builtin.find:
    paths: "{{ restic_profile_config_dir }}"
    patterns: "restic-profile-*.exclude"
    file_type: file
  register: restic_profile_found_exclude_files

- name: remove stale .exclude files
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ restic_profile_found_exclude_files.files }}"
  when:
    - item.path not in (restic_profile_exclude_file_paths | default([]))

- name: construct repository list for referenced .env files
  vars:
    restic_profile_env_repositories_json: >-
      {% set env_repositories = [] %}
      {% set seen_refs = [] %}
      {% for profile_name, profile in restic_profile_profiles.items() %}
      {%   if profile.enabled | default(true) | ansible.builtin.bool %}
      {%     set repo_ref = profile.repository_ref | default('') | string %}
      {%     if repo_ref | length > 0 and repo_ref not in seen_refs %}
      {%       set _ = seen_refs.append(repo_ref) %}
      {%       set _ = env_repositories.append({
                 'key': repo_ref,
                 'value': restic_profile_repositories[repo_ref]
               }) %}
      {%     endif %}
      {%   endif %}
      {% endfor %}
      {{ env_repositories | to_json }}
    restic_profile_env_repositories_data: >-
      {{ restic_profile_env_repositories_json | from_json }}
    restic_profile_env_file_paths_json: >-
      {% set paths = [] %}
      {% for r in restic_profile_env_repositories_data %}
      {%   set _ = paths.append(restic_profile_config_dir ~ '/restic-profile-' ~ r.key ~ '.env') %}
      {% endfor %}
      {{ paths | to_json }}
  ansible.builtin.set_fact:
    restic_profile_env_repositories: "{{ restic_profile_env_repositories_data }}"
    restic_profile_env_file_paths: "{{ restic_profile_env_file_paths_json | from_json }}"
  no_log: true

- name: find managed repository .env files
  become: true
  ansible.builtin.find:
    paths: "{{ restic_profile_config_dir }}"
    patterns: "restic-profile-*.env"
    file_type: file
  register: restic_profile_found_env_files

- name: remove stale repository .env files
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ restic_profile_found_env_files.files }}"
  when:
    - item.path not in (restic_profile_env_file_paths | default([]))

- name: deploy per-repository .env file for referenced repositories
  become: true
  ansible.builtin.template:
    src: etc/restic-profile/restic-profile.env.j2
    dest: "{{ restic_profile_config_dir }}/restic-profile-{{ _repository_item.key }}.env"
    owner: root
    group: root
    # 0640: same restriction as the main TOML config — contains path patterns
    # that reveal the host's filesystem layout, treat as mildly sensitive.
    mode: "0640"
  loop: "{{ restic_profile_env_repositories | default([]) }}"
  loop_control:
    loop_var: _repository_item
    label: "{{ _repository_item.key }}"
  no_log: true

- name: ensure notify templates directory exists
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_notify_template_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - restic_profile_notify_template_dir | default('') | length > 0
    - restic_profile_notify_templates | default({}) | length > 0

- name: deploy notify report templates
  become: true
  ansible.builtin.copy:
    content: "{{ _template_item.value }}"
    dest: "{{ restic_profile_notify_template_dir }}/{{ _template_item.key }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_profile_notify_templates | dict2items }}"
  loop_control:
    loop_var: _template_item
    label: "{{ _template_item.key }}"
  when:
    - restic_profile_notify_template_dir | default('') | length > 0
    - restic_profile_notify_templates | default({}) | length > 0
  no_log: true

- name: deploy restic-profile.toml
  become: true
  ansible.builtin.template:
    src: etc/restic-profile/restic-profile.toml.j2
    dest: "{{ restic_profile_config_file }}"
    owner: root
    group: root
    # 0640: keep the shared TOML root-owned because it contains repository
    # credentials and hook paths. Role-managed services intentionally run as
    # root so they can read it without per-profile ACLs.
    mode: "0640"
  no_log: true
