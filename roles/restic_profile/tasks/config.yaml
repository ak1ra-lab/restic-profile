---
- name: compute deployment plan
  ansible.builtin.set_fact:
    _restic_profile_plan: >-
      {{
        restic_profile_profiles
        | ak1ra_lab.restic_profile.deployment_plan(
            restic_profile_repositories,
            restic_profile_config_dir,
            restic_profile_unit_prefix
          )
      }}
  no_log: true

- name: ensure restic-profile config directory exists
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: ensure restic-profile hooks directory exists
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_hooks_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: deploy managed hook files for enabled profiles
  when:
    - _profile_item.value.enabled | default(true) | ansible.builtin.bool
  ansible.builtin.include_tasks: hooks.yaml
  loop: "{{ restic_profile_profiles | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _profile_item
    label: "{{ _profile_item.key }}"
  vars:
    restic_profile_hook_profile_name: "{{ _profile_item.key }}"
    restic_profile_hook_profile: "{{ _profile_item.value }}"

- name: deploy per-profile exclude file from exclude_file_content
  become: true
  ansible.builtin.copy:
    content: "{{ item.profile.backup.exclude_file_content }}"
    dest: "{{ item.path }}"
    owner: root
    group: root
    mode: "0640"
  loop: "{{ _restic_profile_plan.exclude_files }}"
  loop_control:
    label: "{{ item.profile_name }}.exclude"
  no_log: true

- name: find managed .exclude files in config directory
  become: true
  ansible.builtin.find:
    paths: "{{ restic_profile_config_dir }}"
    patterns: "restic-profile-*.exclude"
    file_type: file
  register: _restic_profile_found_exclude_files

- name: remove stale .exclude files
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _restic_profile_found_exclude_files.files }}"
  when:
    - item.path not in (_restic_profile_plan.expected_exclude_paths)

- name: find managed repository .env files
  become: true
  ansible.builtin.find:
    paths: "{{ restic_profile_config_dir }}"
    patterns: "restic-profile-*.env"
    file_type: file
  register: _restic_profile_found_env_files

- name: remove stale repository .env files
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _restic_profile_found_env_files.files }}"
  when:
    - item.path not in (_restic_profile_plan.expected_env_paths)

- name: deploy per-repository .env file for referenced repositories
  become: true
  ansible.builtin.template:
    src: etc/restic-profile/restic-profile.env.j2
    dest: "{{ item.path }}"
    owner: root
    group: root
    mode: "0640"
  loop: "{{ _restic_profile_plan.env_files }}"
  loop_control:
    loop_var: _repository_item
    label: "{{ _repository_item.key }}.env"
  no_log: true

- name: ensure notify templates directory exists
  become: true
  ansible.builtin.file:
    path: "{{ restic_profile_notify_template_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - restic_profile_notify_template_dir | default('') | length > 0
    - restic_profile_notify_templates | default({}) | length > 0

- name: deploy notify report templates
  become: true
  ansible.builtin.copy:
    content: "{{ _template_item.value }}"
    dest: "{{ restic_profile_notify_template_dir }}/{{ _template_item.key }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ restic_profile_notify_templates | ansible.builtin.dict2items }}"
  loop_control:
    loop_var: _template_item
    label: "{{ _template_item.key }}"
  when:
    - restic_profile_notify_template_dir | default('') | length > 0
    - restic_profile_notify_templates | default({}) | length > 0
  no_log: true

- name: deploy restic-profile.toml
  become: true
  ansible.builtin.template:
    src: etc/restic-profile/restic-profile.toml.j2
    dest: "{{ restic_profile_config_file }}"
    owner: root
    group: root
    mode: "0640"
  no_log: true
