---
# str: deployment state; set "absent" to stop timers and remove all managed files
restic_profile_state: present

# dict: repository credentials and URLs.
#   Each key is a unique repository reference name (resolved via profile's repository_ref).
# Required fields per repository:
#   repository                        str            restic repository URL or local path;
#                                                      use s3:https://endpoint/bucket for S3-compatible storage
#   password                          str            repository encryption password (use Ansible Vault)
# Optional fields per repository:
#   rest_username                     str   ""       HTTP Basic Auth username
#   rest_password                     str   ""       HTTP Basic Auth password
#   cacert                            str   ""       path to CA cert for self-signed TLS
#   aws_default_region                str   ""       optional AWS region hint;
#                                                      leave empty when the backend infers it from the repository URL
#                                                      or does not require one
#   aws_access_key_id                 str   ""       S3-compatible access key ID
#   aws_secret_access_key             str   ""       S3-compatible secret access key
#   google_project_id                 str   ""       required for gs: repositories
#   google_application_credentials    str   ""       service-account JSON path
#   google_access_token               str   ""       short-lived OAuth2 token; takes precedence
#   env                               dict  {}       runtime environment variables injected at subprocess level
#                                                      (e.g. HTTP_PROXY, RESTIC_COMPRESSION); never written
#                                                      to systemd service files, effective only when restic runs
restic_profile_repositories: {}

# dict: notify channel definitions. Each key is a unique notifier name
#   (resolved via a profile's notify_ref).
# Supported types and their required fields:
#   telegram  →                       token, chat_id (optional: timeout, send_kwargs, env.*, top_files_limit)
#   dingtalk  →                       access_token   (optional: secret, env.*, top_files_limit)
#   wechat    →                       key            (optional: env.*, top_files_limit)
#
# Optional per-notifier fields:
#   top_files_limit                   int   3        max largest files and diff-changed files in success
#                                                      notification; set 0 to disable both
#   env                               dict  {}       environment variables injected at send time
#                                                      (e.g. HTTP_PROXY, HTTPS_PROXY — only affects
#                                                      the notification HTTP call, never restic)
#   send_kwargs                       dict  {}       telegram only: extra kwargs forwarded to
#                                                      send_rich_message (e.g. disable_notification)
restic_profile_notify_configs: {}

# dict: profile definitions. Each key becomes the profile name, which is used as
#   the TOML section key ([profiles.<name>]) and as the systemd unit suffix.
# Required fields per profile:
#   repository_ref                    str            reference to a repository in restic_profile_repositories
#
# Optional nested fields per profile:
#   notify_ref                        str   ""       reference to a notifier in restic_profile_notify_configs;
#                                                      leave empty to skip IM notifications for this profile
#
#   enabled                           bool  true     skip deploying this profile when false
#   timer_enabled                     bool  true     deploy units but stop/disable the timer when false
#   tag                               str   <name>   snapshot tag; defaults to the profile name
#
#   on_calendar                       str   ""       OnCalendar value for the profile timer. Leave empty to disable the timer.
#   randomized_delay_sec              str   ""       RandomizedDelaySec value for the profile timer
#   persistent                        bool  true     Persistent= value for the profile timer; set to false to
#                                                      skip catch-up runs after unplanned downtime
#
#   restic_binary                     str   <global> override the global restic binary for this profile
#   no_cache                          bool  <global> override the global --no-cache toggle for this profile
#   retry_lock                        str   <global> override the global --retry-lock duration for this profile
#   unlock                            bool  <global> override the global unlock toggle for this profile
#
#   cpu_quota                         str   <global> CPUQuota= value for the generated service unit
#   nice                              int   <global> Nice= value for the generated service unit
#   io_scheduling_class               str   <global> IOSchedulingClass= value for the generated service unit
#   io_scheduling_priority            int   <global> IOSchedulingPriority= value for the generated service unit
#
#   backup                            dict           backup configurations (optional):
#     sources                         list  []       source paths
#     exclude_patterns                list  []       each entry becomes one --exclude
#     exclude_file_content            str   ""       rendered to /etc/restic-profile/restic-profile-<name>.exclude; passed as --exclude-file
#     one_file_system                 bool  false    add --one-file-system to restic backup
#
#   retention                         dict           retention action configurations (optional):
#     keep_last                       int   0        keep last N snapshots
#     keep_hourly                     int   0        keep last N hourly snapshots
#     keep_daily                      int   0        keep last N daily snapshots
#     keep_weekly                     int   0        keep last N weekly snapshots
#     keep_monthly                    int   0        keep last N monthly snapshots
#     keep_yearly                     int   0        keep last N yearly snapshots
#     prune                           bool  false    run standalone restic prune when keep_* are all 0;
#                                                      otherwise add --prune to restic forget
#     forget_current_host             bool  true     add --host <current host> to restic forget by default;
#                                                      set false for cross-host retention jobs
#   hooks                             dict           hooks config (rendered under [profiles.<name>.hooks])
#     shell                           str   "/bin/sh"
#     prevalidate                     list  []       inline commands before repository checks / auto-init
#     before                          list  []       inline commands before backup
#     after                           list  []       inline commands after the backup attempt
#     failure                         list  []       inline commands when prevalidate/before/backup fails
#     success                         list  []       inline commands when the full backup flow succeeds
#
#   env                               dict  {}       runtime environment variables injected at subprocess level;
#                                                      applied after repository env, so profile env can override
#                                                      repository env (e.g. PGPASSWORD, MYSQL_PWD for backup hooks)
restic_profile_profiles: {}

# str: global restic executable.
#      Leave empty to resolve `restic` from PATH (the runner also falls back to
#      common absolute paths like /usr/local/bin/restic and /usr/bin/restic).
restic_profile_restic_binary: ""

# bool: global --no-cache toggle for every restic invocation.
#       Individual profiles can override this with their own no_cache field.
restic_profile_no_cache: false

# str: global retry-lock duration passed to every restic invocation.
#      This is opt-in because older restic builds (for example Debian 12's 0.14)
#      do not support --retry-lock and will fail directly when it is configured.
#      Individual profiles can override this with their own retry_lock field.
#      Set to "" to disable globally.
restic_profile_retry_lock: ""

# bool: global unlock toggle. When true, run restic unlock before backup or
#       retention to remove stale locks left by interrupted processes.
#       Individual profiles can override this with their own unlock field.
restic_profile_unlock: false

# str: global CPUQuota= applied to managed restic-profile systemd services and
#      the optional restic-profile-scope helper. "100%" caps execution to one
#      CPU worth of runtime; set to "" to disable the quota entirely.
restic_profile_systemd_cpu_quota: "100%"

# int|str: global Nice= value applied to managed systemd runs.
#          Set to "" to keep the system default priority.
restic_profile_systemd_nice: ""

# str: global IOSchedulingClass= value applied to managed systemd runs.
#      Allowed values are "realtime", "best-effort", and "idle".
#      Set to "" to keep the system default.
restic_profile_systemd_io_scheduling_class: ""

# int|str: global IOSchedulingPriority= value applied to managed systemd runs.
#          Valid values are 0-7. Set to "" to keep the kernel default.
restic_profile_systemd_io_scheduling_priority: ""

# str: install source for the restic-profile Python package — "local" | "pypi" | "testpypi"
#      "local" builds the wheel on the control node and uploads it to the managed host.
#      "pypi" installs the latest published release from the public PyPI index.
restic_profile_pip_install_source: pypi

# str: source for the restic binary — "apt" | "go_build" | "existing"
#      "apt" installs the distro package on the managed host.
#      "go_build" builds a static binary on the control node and copies it to the managed host.
#      "existing" leaves restic binary management to the operator.
restic_profile_restic_install_source: apt

# str: destination path used when restic_profile_restic_install_source == "go_build"
restic_profile_restic_install_path: /usr/local/bin/restic

# str: git ref used when go_build builds restic from source
restic_profile_restic_go_build_repo_version: master

# str: target GOOS used when go_build builds restic
restic_profile_restic_go_build_goos: linux

# str: target GOARCH used when go_build builds restic
restic_profile_restic_go_build_goarch: amd64

# bool: whether go_build disables CGO for a static restic binary
restic_profile_restic_go_build_static: true

# str: linker flags passed when go_build builds restic
restic_profile_restic_go_build_ldflags: "-s -w"

# str: optional directory for custom Jinja2 notify report templates.
#      When set, restic-profile searches this directory for notify_success.md.j2
#      and notify_failure.md.j2 before falling back to the built-in defaults.
#      Use with restic_profile_notify_templates to deploy custom templates.
restic_profile_notify_template_dir: ""

# dict: custom notify report template content (Jinja2).
#   Keys: "notify_success.md.j2", "notify_failure.md.j2"
#   When non-empty, the role writes these to restic_profile_notify_template_dir
#   and sets [global].template_dir in restic-profile.toml.
#   Template variables available for success:
#     host, profile, short_id, time, tags, paths,
#     data_added, duration, largest_files (list of (name, size) tuples),
#     diff_has_parent (bool),
#     diff_changed_files, diff_added_files, diff_added_dirs,
#     diff_added_bytes, diff_removed_files, diff_removed_dirs,
#     diff_removed_bytes (human-readable strings),
#     diff_changes (list of (modifier, path) tuples),
#     repo_snapshots_count, repo_total_size
#   Template variables available for failure:
#     host, profile, time, error
restic_profile_notify_templates: {}
