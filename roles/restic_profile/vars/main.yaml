---
# --- Paths (following FHS) ---

# str: dedicated restic-profile configuration directory
restic_profile_config_dir: /etc/restic-profile

# str: restic-profile TOML config file path
restic_profile_config_file: "{{ restic_profile_config_dir }}/restic-profile.toml"

# str: directory for role-managed hook scripts copied or rendered from the control node
restic_profile_hooks_dir: "{{ restic_profile_config_dir }}/hooks.d"

# str: restic-profile state directory (FHS state dir)
restic_profile_state_dir: /var/lib/restic-profile

# str: restic-profile dedicated venv directory (isolated, safe to delete)
restic_profile_venv_dir: "{{ restic_profile_state_dir }}/venv"

# str: restic-profile binary path (derived from venv_dir; do not override)
restic_profile_bin: "{{ restic_profile_venv_dir }}/bin/restic-profile"

# str: operator-facing convenience symlink for the venv entry point
restic_profile_cli_link: /usr/local/bin/restic-profile

# str: operator-facing helper that runs restic-profile in a transient systemd scope
restic_profile_scope_helper_path: /usr/local/bin/restic-profile-scope

# --- Systemd unit naming prefixes ---
# Backup profiles  (sources non-empty): <backup_prefix><name>.{service,timer}
# Retention-only profiles (sources: []): <forget_prefix><name>.{service,timer}
# These are defined here so that tasks and templates reference a single source
# of truth instead of duplicating the string literals in multiple places.
restic_profile_backup_unit_prefix: "restic-profile-backup-"
restic_profile_forget_unit_prefix: "restic-profile-forget-"

# list[str]: hook lifecycle phases shared by the role tasks and TOML template
restic_profile_hook_phases:
  - prevalidate
  - before
  - after
  - failure
  - success
