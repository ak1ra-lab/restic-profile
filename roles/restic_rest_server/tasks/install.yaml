---
- name: install htpasswd Python dependencies
  become: true
  ansible.builtin.apt:
    name:
      # python3-passlib + python3-bcrypt are required by community.general.htpasswd
      # on the managed node. passlib is the interface layer; python3-bcrypt provides
      # the actual bcrypt backend passlib calls for crypt_scheme: bcrypt.
      # Ansible modules run on the managed node's Python interpreter, so these
      # libraries must be installed there (not in the Ansible venv on the control node).
      - python3-passlib
      - python3-bcrypt
    state: present
    update_cache: true

# restic-rest-server is available starting from Debian 13 (trixie);
# on Debian 12 (bookworm) this will silently fail.
- name: install restic-rest-server via apt
  when: restic_rest_server_binary_install_source == 'apt'
  become: true
  ansible.builtin.apt:
    name:
      - restic-rest-server
    state: present
    update_cache: true
  failed_when: false

- name: build restic-rest-server on control node
  when: restic_rest_server_binary_install_source == 'go_build'
  ansible.builtin.include_role:
    name: go_build
    apply:
      become: false
  vars:
    go_build_repo_url: https://github.com/restic/rest-server.git
    go_build_repo_version: "{{ restic_rest_server_go_build_repo_version }}"
    go_build_package: .
    go_build_output_name: restic-rest-server
    go_build_goos: "{{ restic_rest_server_go_build_goos }}"
    go_build_goarch: "{{ restic_rest_server_go_build_goarch }}"
    go_build_static: "{{ restic_rest_server_go_build_static }}"
    go_build_ldflags: "{{ restic_rest_server_go_build_ldflags }}"

- name: install go_build restic-rest-server binary
  when: restic_rest_server_binary_install_source == 'go_build'
  become: true
  ansible.builtin.copy:
    src: "{{ go_build_binary_path }}"
    dest: "{{ restic_rest_server_binary_install_path }}"
    owner: root
    group: root
    mode: "0755"

- name: check if /usr/bin/restic-rest-server exists (installed via apt)
  ansible.builtin.stat:
    path: /usr/bin/restic-rest-server
  register: restic_rest_server_apt_stat

- name: check if configured restic-rest-server binary exists
  ansible.builtin.stat:
    path: "{{ restic_rest_server_binary_install_path }}"
  register: restic_rest_server_local_stat

- name: set restic-rest-server availability facts
  ansible.builtin.set_fact:
    # true when binary is reachable via either path
    restic_rest_server_available: >-
      {{ restic_rest_server_apt_stat.stat.exists or restic_rest_server_local_stat.stat.exists }}
    # prefer the apt-managed path; fall back to the manually placed one
    restic_rest_server_exec_path: >-
      {{ '/usr/bin/restic-rest-server'
         if restic_rest_server_apt_stat.stat.exists
         else restic_rest_server_binary_install_path }}
