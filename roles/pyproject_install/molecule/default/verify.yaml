---
# verify.yml — assert that pyproject_install produced the expected artefacts.
#
# Checks performed
# ----------------
# 1. The target venv directory exists and contains a Python interpreter.
# 2. The restic-profile CLI entry-point is present and executable.
# 3. The CLI responds to --help with exit code 0 and mentions key subcommands.
# 4. pydantic is importable from the venv (validates core dependencies are installed).
# 5. restic_profile.config is importable from the venv (validates the package itself is installed).
#
# These checks collectively confirm that:
#   • the venv was created at the correct path,
#   • the package itself was installed,
#   • the core dependencies are present and importable.

- name: verify
  hosts: all
  gather_facts: false
  become: true

  vars:
    _venv: /var/lib/molecule-test/venvs/restic-profile
    _python: /var/lib/molecule-test/venvs/restic-profile/bin/python
    _restic_profile_bin: /var/lib/molecule-test/venvs/restic-profile/bin/restic-profile

  tasks:
    # ------------------------------------------------------------------ #
    # 1. Venv Python interpreter                                           #
    # ------------------------------------------------------------------ #

    - name: stat venv python interpreter
      ansible.builtin.stat:
        path: "{{ _python }}"
      register: _venv_python

    - name: assert venv python exists and is executable
      ansible.builtin.assert:
        that:
          - _venv_python.stat.exists
          - _venv_python.stat.executable
        fail_msg: >-
          Expected a Python interpreter at {{ _python }} but it was not found. Check that pyproject_install created the venv at the right path.
    # ------------------------------------------------------------------ #
    # 2. CLI entry-point                                                   #
    # ------------------------------------------------------------------ #

    - name: stat restic-profile binary
      ansible.builtin.stat:
        path: "{{ _restic_profile_bin }}"
      register: _restic_profile_binary

    - name: assert restic-profile binary exists and is executable
      ansible.builtin.assert:
        that:
          - _restic_profile_binary.stat.exists
          - _restic_profile_binary.stat.executable
        fail_msg: >-
          Expected the restic-profile entry-point at {{ _restic_profile_bin }} but it was not found. Confirm that restic-profile was installed and that the entry points are wired correctly in pyproject.toml.
    # ------------------------------------------------------------------ #
    # 3. CLI --help sanity check                                           #
    # ------------------------------------------------------------------ #

    - name: run restic-profile --help
      ansible.builtin.command:
        argv:
          - "{{ _restic_profile_bin }}"
          - --help
      register: _help
      changed_when: false
      failed_when: _help.rc != 0

    - name: assert --help output mentions the backup subcommand
      ansible.builtin.assert:
        that:
          - >-
            'backup' in (_help.stdout | lower) or 'backup' in (_help.stderr | lower)
        fail_msg: >-
          restic-profile --help did not mention the 'backup' subcommand. Output was: {{ _help.stdout }} {{ _help.stderr }}

    - name: assert --help output mentions the forget subcommand
      ansible.builtin.assert:
        that:
          - >-
            'forget' in (_help.stdout | lower) or 'forget' in (_help.stderr | lower)
        fail_msg: >-
          restic-profile --help did not mention the 'forget' subcommand. Output was: {{ _help.stdout }} {{ _help.stderr }}

    # ------------------------------------------------------------------ #
    # 4. pydantic                                                           #
    # ------------------------------------------------------------------ #

    - name: import pydantic inside the venv
      ansible.builtin.command:
        argv:
          - "{{ _python }}"
          - -c
          - "import pydantic; print('pydantic', pydantic.__version__)"
      register: _pydantic_import
      changed_when: false
      failed_when: _pydantic_import.rc != 0

    - name: assert pydantic is importable
      ansible.builtin.assert:
        that:
          - "'pydantic' in _pydantic_import.stdout"
        fail_msg: >-
          pydantic is not importable from {{ _python }}. Check that restic-profile was installed correctly from tasks/local_wheel.yaml or tasks/from_pypi.yaml.

    # ------------------------------------------------------------------ #
    # 5. restic_profile.config                                              #
    # ------------------------------------------------------------------ #

    - name: import restic_profile.config inside the venv
      ansible.builtin.command:
        argv:
          - "{{ _python }}"
          - -c
          - "from restic_profile.config import Profile; print('profile', Profile.__name__)"
      register: _restic_profile_import
      changed_when: false
      failed_when: _restic_profile_import.rc != 0

    - name: assert restic_profile.config is importable
      ansible.builtin.assert:
        that:
          - "'profile Profile' in _restic_profile_import.stdout"
        fail_msg: >-
          restic_profile.config is not importable from {{ _python }}. Check that restic-profile was installed correctly from tasks/local_wheel.yaml or tasks/from_pypi.yaml.
