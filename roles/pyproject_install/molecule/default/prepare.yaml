---
# prepare.yml — bootstrap the debian:12-slim container before the role runs.
#
# debian:12-slim ships without Python, which is required by every Ansible
# module other than 'raw'.  Install it here so that all subsequent tasks in
# converge.yml and verify.yml can use the full Ansible module library.

- name: prepare container for pyproject_install molecule test
  hosts: all
  gather_facts: false # Python not yet available; skip fact gathering.
  become: true

  tasks:
    - name: bootstrap Python 3 via raw (no Python available yet)
      ansible.builtin.raw: |
        apt-get update -qq && apt-get install -y --no-install-recommends python3
      changed_when: true
