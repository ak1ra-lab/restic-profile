---
# converge.yml — apply the pyproject_install role with a representative local
# wheel install so the role can be validated before the package is published.
#
# Variables chosen here
# ---------------------
# pyproject_install_source:          local  — build the wheel from this repo
# pyproject_install_package_name:    restic-profile — the package under test
# pyproject_install_venv_dir:        isolated test path so the scenario does not
#                                    interfere with any system Python environment

- name: converge
  hosts: all
  gather_facts: false
  become: true

  vars:
    pyproject_install_source: local
    pyproject_install_package_name: restic-profile
    pyproject_install_local_project_root: "{{ playbook_dir | dirname | dirname | dirname | dirname }}"
    pyproject_install_venv_dir: /var/lib/molecule-test/venvs/restic-profile

  roles:
    - role: pyproject_install
