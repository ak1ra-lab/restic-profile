---
# str: install source — "local" | "pypi" | "testpypi"
pyproject_install_source: local

# str: PyPI package name (required); also used to derive the default venv path
#      example: "restic-profile", "sing-box-config"
pyproject_install_package_name: ""

# str: optional extras to install with the package (empty = no extras)
#      example: "security"  ->  installs requests[security]
pyproject_install_package_extras: ""

# str: local project root directory where uv build --wheel is executed (source=local only)
#      playbooks/ is a subdirectory of the project root, so we go one level up from playbook_dir
pyproject_install_local_project_root: "{{ playbook_dir | dirname }}"

# str: absolute path to the venv directory on the remote host (FHS: /var/lib/<project>/.venv)
#      callers should override this to their specific path
pyproject_install_venv_dir: "/var/lib/{{ pyproject_install_package_name }}/.venv"

# str: temporary directory on the remote host to hold the wheel during transfer
pyproject_install_remote_tmp_dir: /tmp

# list[str]: system packages installed via apt before creating the venv
pyproject_install_system_packages:
  - python3-venv
