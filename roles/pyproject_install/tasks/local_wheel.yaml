---
- name: delete local dist/ before uv build
  become: false
  delegate_to: localhost
  run_once: true
  ansible.builtin.file:
    path: "{{ [pyproject_install_local_project_root, 'dist'] | ansible.builtin.path_join }}"
    state: absent

- name: uv build wheel locally
  become: false
  delegate_to: localhost
  run_once: true
  ansible.builtin.command:
    argv: [uv, build, --wheel]
    chdir: "{{ pyproject_install_local_project_root }}"
  changed_when: true

- name: resolve built wheel path
  become: false
  delegate_to: localhost
  run_once: true
  ansible.builtin.set_fact:
    _pyproject_install_wheel_path: >-
      {{ lookup('ansible.builtin.fileglob',
           pyproject_install_local_project_root ~ '/dist/*.whl',
           wantlist=True) | sort | last }}

- name: debug built wheel path
  become: false
  delegate_to: localhost
  run_once: true
  ansible.builtin.debug:
    var: _pyproject_install_wheel_path

- name: copy wheel to remote tmp
  ansible.builtin.copy:
    src: "{{ _pyproject_install_wheel_path }}"
    dest: >-
      {{ [pyproject_install_remote_tmp_dir,
          _pyproject_install_wheel_path | ansible.builtin.basename]
         | ansible.builtin.path_join }}
    mode: "0644"
  register: _pyproject_install_wheel_remote

- name: install wheel into remote venv
  ansible.builtin.pip:
    name: >-
      {{ pyproject_install_package_name
         ~ ('[' ~ pyproject_install_package_extras ~ ']'
            if pyproject_install_package_extras else '')
         ~ ' @ file://' ~ _pyproject_install_wheel_remote.dest }}
    state: forcereinstall
    virtualenv: "{{ pyproject_install_venv_dir }}"
    virtualenv_command: python3 -m venv

- name: remove wheel from remote tmp
  ansible.builtin.file:
    path: "{{ _pyproject_install_wheel_remote.dest }}"
    state: absent
