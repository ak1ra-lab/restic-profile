[project]
site_name = "restic-profile"
site_description = "Profile-based restic automation in Python and Ansible"
site_url = "https://ak1ra-lab.github.io/restic-profile/"
site_author = "ak1ra"
copyright = "Copyright (c) 2026 ak1ra"
repo_url = "https://github.com/ak1ra-lab/restic-profile"
repo_name = "ak1ra-lab/restic-profile"
docs_dir = "docs"
site_dir = "site"
dev_addr = "0.0.0.0:8000"
nav = [
    { "Home" = "index.md" },
    { "restic-profile" = [
        { "Ansible examples" = "restic-profile/examples.md" },
        { "TOML config template" = "restic-profile/toml-config.md" },
        { "CLI reference" = "restic-profile/cli.md" },
    ] },
    { "restic-rest-server" = [
        { "Overview" = "restic-rest-server/index.md" },
    ] },
]

[project.theme]
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
