[project]
site_name = "restic-profile"
site_description = "Profile-based restic automation in Python and Ansible"
site_author = "ak1ra"
copyright = "Copyright (c) 2026 ak1ra"
docs_dir = "docs"
site_dir = "site"
dev_addr = "0.0.0.0:8000"
nav = [
    { "Home" = "index.md" },
    { "Examples" = "restic-profile/examples.md" },
    { "With Ansible" = "restic-profile/ansible.md" },
    { "Config" = "restic-profile/config.md" },
    { "CLI" = "restic-profile/cli.md" },
    { "Profiles Reference" = "restic-profile/profiles.md" },
]

[project.theme]
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.instant",
    "navigation.sections",
    "navigation.top",
]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.superfences]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
